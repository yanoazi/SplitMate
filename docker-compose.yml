services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: splitmate
      POSTGRES_PASSWORD: splitmate
      POSTGRES_DB: splitmate
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U splitmate"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "7777:7777"
    environment:
      DATABASE_URL: postgresql://splitmate:splitmate@db:5432/splitmate
      PUBLIC_BASE_URL: http://localhost:7777
      DEMO_MODE: "1"
      DEMO_TOKEN: demo
      DEMO_EDIT_PIN: "1234"
      LINE_CHANNEL_ACCESS_TOKEN: ${LINE_CHANNEL_ACCESS_TOKEN:-}
      LINE_CHANNEL_SECRET: ${LINE_CHANNEL_SECRET:-}
      SECRET_KEY: dev-compose-secret
      PORT: "7777"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
