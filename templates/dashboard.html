<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ group_name }} · SplitMate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
</head>
<body class="page-dashboard" data-token="{{ token }}">
  <div class="grain" aria-hidden="true"></div>

  <header class="site-bar">
    <a class="mark" href="/">SplitMate</a>
    <nav>
      <a href="/">首頁</a>
      <button type="button" id="btn-refresh" class="linkish">重新整理</button>
    </nav>
  </header>

  <main class="dash-shell">
    <header class="dash-head">
      <p class="kicker">{% if is_demo %}Demo{% else %}Group ledger{% endif %}</p>
      <h1 id="group-name">{{ group_name }}</h1>
      <p id="summary-line" class="dash-summary">載入中…</p>
      <div class="pin-row">
        <label for="edit-pin">PIN</label>
        <input id="edit-pin" type="password" inputmode="numeric" maxlength="4" autocomplete="one-time-code" placeholder="{% if is_demo %}1234{% else %}四碼{% endif %}" />
        <span class="pin-hint">{% if is_demo %}Demo 預設 1234{% else %}LINE 打 #網頁 取得{% endif %}</span>
      </div>
    </header>

    <section class="dash-block">
      <div class="block-head">
        <h2>最少轉帳結算</h2>
        <p>全部未付帳目壓成最少筆數的「誰付給誰」（等同 <code>#結算</code>）</p>
      </div>
      <div id="settlement-list" class="stack"></div>
    </section>

    <section class="dash-block">
      <div class="block-head">
        <h2>帳單</h2>
        <p>勾選後可計算相抵或批次標記已付；刪除需 PIN。記帳請在 LINE 由付款人 <code>#分帳</code>。</p>
      </div>
      <div class="batch-toolbar">
        <button type="button" id="btn-select-unpaid" class="chip">勾選未結清</button>
        <button type="button" id="btn-clear-select" class="chip">清除</button>
        <button type="button" id="btn-batch-calc" class="chip chip-accent">計算相抵</button>
        <button type="button" id="btn-batch-settle" class="chip chip-warn">全部標記已付</button>
      </div>
      <div id="batch-settlement-list" class="batch-panel stack">
        <p class="empty">勾選帳單後按「計算相抵」。</p>
      </div>
      <div id="bills-list" class="stack bills-stack"></div>
    </section>
  </main>

  <div id="toast" class="toast" hidden></div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
  <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
